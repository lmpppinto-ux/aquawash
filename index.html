<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AquaWash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080d1a;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;position:relative}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.page{padding:24px 18px 100px;animation:slideUp .3s ease}
.hero{background:linear-gradient(135deg,#0c1f3f,#0a192e);border-radius:20px;padding:30px 22px;margin-bottom:16px;border:1px solid rgba(56,189,248,.15)}
.btn-main{background:linear-gradient(135deg,#0284c7,#38bdf8);border:none;border-radius:10px;padding:12px 22px;color:#fff;font-weight:600;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-back{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 18px;color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif}
.input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:13px 14px;color:#fff;font-size:15px;outline:none;font-family:'DM Sans',sans-serif}
.label{color:rgba(255,255,255,.4);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin:14px 0 7px;display:block}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(8,13,26,.97);border-top:1px solid rgba(255,255,255,.07);z-index:99}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px}
.nav-btn.active{color:#38bdf8}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.notif{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:14px 20px;color:#fff;font-weight:600;font-size:13px;text-align:center;z-index:200;background:#10b981;animation:slideUp .3s ease}
</style>
</head>
<body>
<div id="app">
  <div id="notif-area"></div>
  <div id="screen" style="flex:1;overflow-y:auto"></div>
  <nav>
    <button class="nav-btn active" id="nav-home" onclick="goto('home')"><span style="font-size:20px">⊙</span>Início</button>
    <button class="nav-btn" id="nav-book" onclick="goto('book')"><span style="font-size:20px">＋</span>Agendar</button>
    <button class="nav-btn" id="nav-bookings" onclick="goto('bookings')"><span style="font-size:20px">◷</span>Os Meus</button>
    <button class="nav-btn" id="nav-admin" onclick="goto('admin')"><span style="font-size:20px">⚙</span>Admin</button>
  </nav>
</div>

<script>
const SERVICES=[
  {id:1,name:"Lavagem Simples",price:15,dur:"30 min",icon:"💧",color:"#3b82f6"},
  {id:2,name:"Lavagem Completa",price:22,dur:"1h",icon:"🫧",color:"#06b6d4"},
  {id:3,name:"Polimento",price:120,dur:"3h",icon:"✨",color:"#8b5cf6"},
  {id:4,name:"Higienização",price:180,dur:"4h",icon:"🧼",color:"#10b981"},
  {id:5,name:"Detailing Premium",price:350,dur:"1 dia",icon:"🏆",color:"#f59e0b"}
];
const SLOTS=["08:00","09:00","10:00","11:00","13:00","14:00","15:00","16:00","17:00"];
let bookings=[
  {id:1,service:"Lavagem Completa",price:15,date:"2025-06-10",time:"09:00",plate:"AB-12-CD",model:"BMW Série 3",status:"concluido",payment:"pago"},
  {id:2,service:"Polimento",price:120,date:"2025-06-11",time:"10:00",plate:"XY-98-ZW",model:"Audi A4",status:"pendente",payment:"pendente"}
];
let userBookings=[];
let currentTab='home';
let adminLogged=false;
let bookStep=0,selSvc=null,selDate='',selTime='',selPlate='',selModel='',selPay='mbway';

function showNotif(msg){
  const a=document.getElementById('notif-area');
  a.innerHTML=`<div class="notif">${msg}</div>`;
  setTimeout(()=>a.innerHTML='',3000);
}

function goto(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab)?.classList.add('active');
  render();
}

function render(){
  const s=document.getElementById('screen');
  if(currentTab==='home') s.innerHTML=renderHome();
  else if(currentTab==='book'){s.innerHTML=renderBook();bindBook();}
  else if(currentTab==='bookings') s.innerHTML=renderBookings();
  else if(currentTab==='admin') s.innerHTML=adminLogged?renderAdminPanel():renderAdminLogin();
}

function statusColor(st){return{pendente:"#f59e0b",em_curso:"#3b82f6",concluido:"#10b981"}[st]||"#888"}
function statusLabel(st){return{pendente:"Pendente",em_curso:"Em Curso",concluido:"Concluído"}[st]||st}

function renderHome(){
  const rec=userBookings.slice(0,2).map(b=>`
    <div class="card" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1"><div style="color:#fff;font-weight:600;font-size:14px;margin-bottom:3px">${b.service}</div>
      <div style="color:rgba(255,255,255,.4);font-size:12px">${b.model} · ${b.plate}</div>
      <div style="color:rgba(255,255,255,.4);font-size:12px">${b.date} às ${b.time}</div></div>
      <div style="text-align:right"><div style="color:${statusColor(b.status)};font-size:11px;font-weight:600;padding:3px 8px;background:${statusColor(b.status)}18;border-radius:20px;margin-bottom:4px">${statusLabel(b.status)}</div>
      <div style="color:#38bdf8;font-weight:700">€${b.price}</div></div>
    </div>`).join('');
  return`<div class="page">
    <div class="hero">
      <p style="color:#38bdf8;font-size:10px;letter-spacing:3px;margin-bottom:8px">LAVAGEM PREMIUM</p>
      <h1 style="color:#fff;font-size:34px;font-family:Syne;font-weight:800;margin-bottom:8px">Aqua<span style="color:#38bdf8">Wash</span></h1>
      <p style="color:rgba(255,255,255,.5);font-size:14px;margin-bottom:20px">O seu carro merece o melhor cuidado</p>
      <button class="btn-main" onclick="goto('book')">Agendar Agora →</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      ${[["2.4k+","Clientes"],["5★","Avaliação"],["8","Serviços"]].map(([v,l])=>`<div class="card" style="flex:1;text-align:center;padding:14px 10px"><div style="color:#fff;font-family:Syne;font-weight:800;font-size:18px;margin-bottom:2px">${v}</div><div style="color:rgba(255,255,255,.35);font-size:11px">${l}</div></div>`).join('')}
    </div>
    ${userBookings.length?`<div style="color:#fff;font-family:Syne;font-weight:700;font-size:16px;margin-bottom:12px">Recentes</div>${rec}`:''}
    <div style="background:linear-gradient(135deg,#78350f,#92400e);border-radius:16px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(251,191,36,.2)">
      <div><p style="color:#fbbf24;font-size:11px;letter-spacing:2px;margin-bottom:4px">PROMOÇÃO</p><p style="color:#fff;font-weight:700;font-size:16px">10% de desconto</p><p style="color:rgba(255,255,255,.6);font-size:12px">Na primeira lavagem</p></div>
      <span style="font-size:40px">🚗</span>
    </div>
  </div>`;
}

function renderBook(){
  const steps=["Serviço","Quando","Carro","Pagamento"];
  const prog=steps.map((l,i)=>`<div style="flex:1;text-align:center"><div style="height:3px;border-radius:2px;background:${i<=bookStep?'#38bdf8':'rgba(255,255,255,.1)'};margin-bottom:4px"></div><span style="font-size:9px;color:${i===bookStep?'#38bdf8':'rgba(255,255,255,.3)'};letter-spacing:.5px">${l.toUpperCase()}</span></div>`).join('');
  let content='';
  if(bookStep===0){
    content=SERVICES.map(s=>`<div onclick="selectSvc(${s.id})" style="display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.04);border:1px solid ${selSvc===s.id?s.color:'rgba(255,255,255,.07)'};border-radius:14px;padding:14px 16px;cursor:pointer;margin-bottom:10px">
      <span style="font-size:26px">${s.icon}</span>
      <div style="flex:1"><div style="color:#fff;font-weight:600;font-size:14px">${s.name}</div><div style="color:rgba(255,255,255,.4);font-size:12px">⏱ ${s.dur}</div></div>
      <div style="color:${s.color};font-weight:700">€${s.price}</div>
      ${selSvc===s.id?`<div style="width:22px;height:22px;border-radius:50%;background:${s.color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">✓</div>`:''}
    </div>`).join('');
  } else if(bookStep===1){
    const today=new Date().toISOString().split('T')[0];
    content=`<label class="label">Data</label>
    <input type="date" class="input" id="inp-date" min="${today}" value="${selDate}" onchange="selDate=this.value;document.getElementById('time-grid').style.display=selDate?'grid':'none'"/>
    <label class="label">Horário</label>
    <div id="time-grid" style="display:${selDate?'grid':'none'};grid-template-columns:repeat(3,1fr);gap:8px">
      ${SLOTS.map(t=>`<button onclick="selTime='${t}';render()" style="padding:11px 0;background:${selTime===t?'rgba(56,189,248,.2)':'rgba(255,255,255,.05)'};border:1px solid ${selTime===t?'#38bdf8':'rgba(255,255,255,.08)'};border-radius:10px;color:${selTime===t?'#fff':'rgba(255,255,255,.6)'};font-size:13px;cursor:pointer;font-family:DM Sans,sans-serif">${t}</button>`).join('')}
    </div>`;
  } else if(bookStep===2){
    content=`<label class="label">Matrícula</label>
    <input class="input" id="inp-plate" placeholder="AB-12-CD" maxlength="8" value="${selPlate}" oninput="selPlate=this.value.toUpperCase();this.value=selPlate"/>
    <label class="label">Modelo</label>
    <input class="input" id="inp-model" placeholder="Ex: BMW Série 3" value="${selModel}" oninput="selModel=this.value"/>`;
  } else {
    const svc=SERVICES.find(s=>s.id===selSvc);
    content=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:16px">
      <div style="color:rgba(255,255,255,.5);font-size:12px;margin-bottom:12px;letter-spacing:1px">RESUMO</div>
      ${[["Serviço",`${svc?.icon} ${svc?.name}`],["Data",selDate],["Hora",selTime],["Veículo",selModel],["Matrícula",selPlate]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:rgba(255,255,255,.45);font-size:13px">${k}</span><span style="color:#fff;font-size:13px">${v}</span></div>`).join('')}
      <div style="height:1px;background:rgba(255,255,255,.08);margin:10px 0"></div>
      <div style="display:flex;justify-content:space-between"><span style="color:rgba(255,255,255,.45);font-size:13px">Total</span><span style="color:#38bdf8;font-weight:700;font-size:18px">€${svc?.price}</span></div>
    </div>
    <label class="label">Pagamento</label>
    ${[["mbway","📱","MB Way"],["card","💳","Cartão"],["cash","💵","Dinheiro"]].map(([id,ic,lb])=>`<div onclick="selPay='${id}';render()" style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid ${selPay===id?'#38bdf8':'rgba(255,255,255,.07)'};border-radius:12px;padding:13px 16px;cursor:pointer;margin-bottom:8px"><span style="font-size:20px">${ic}</span><span style="color:#fff;font-size:14px">${lb}</span>${selPay===id?'<span style="margin-left:auto;color:#38bdf8">●</span>':''}</div>`).join('')}
    <button class="btn-main" onclick="confirmBook()" style="width:100%;margin-top:16px;padding:14px">Confirmar e Pagar €${svc?.price}</button>`;
  }
  const canNext=(bookStep===0&&selSvc)||(bookStep===1&&selDate&&selTime)||(bookStep===2&&selPlate.length>=7&&selModel.length>=2);
  return`<div class="page">
    <h2 style="color:#fff;font-family:Syne;font-size:22px;font-weight:800;margin-bottom:20px">Novo Agendamento</h2>
    <div style="display:flex;gap:6px;margin-bottom:24px">${prog}</div>
    ${content}
    ${bookStep<3?`<div style="display:flex;gap:10px;margin-top:24px">
      ${bookStep>0?`<button class="btn-back" onclick="bookStep--;render()">← Voltar</button>`:''}
      <button class="btn-main" style="flex:1;opacity:${canNext?1:.35}" ${canNext?'':'disabled'} onclick="bookStep++;render()">Próximo →</button>
    </div>`:''}
  </div>`;
}

function bindBook(){
  const dp=document.getElementById('inp-date');
  if(dp)dp.addEventListener('change',e=>{selDate=e.target.value;document.getElementById('time-grid').style.display=selDate?'grid':'none';});
}

function selectSvc(id){selSvc=id;render();}

function confirmBook(){
  const svc=SERVICES.find(s=>s.id===selSvc);
  const nb={id:Date.now(),service:svc.name,price:svc.price,date:selDate,time:selTime,plate:selPlate,model:selModel,status:'pendente',payment:'pendente'};
  bookings.unshift(nb);userBookings.unshift(nb);
  showNotif('Agendamento confirmado! 🎉');
  bookStep=0;selSvc=null;selDate='';selTime='';selPlate='';selModel='';
  goto('bookings');
}

function renderBookings(){
  if(!userBookings.length)return`<div class="page" style="text-align:center;padding-top:80px"><div style="font-size:48px;margin-bottom:16px">🚗</div><p style="color:rgba(255,255,255,.4)">Sem agendamentos ainda</p></div>`;
  return`<div class="page"><h2 style="color:#fff;font-family:Syne;font-size:22px;font-weight:800;margin-bottom:20px">Os Meus Agendamentos</h2>
  ${userBookings.map(b=>`<div class="card" style="display:flex;align-items:center;gap:12px"><div style="flex:1"><div style="color:#fff;font-weight:600;font-size:14px;margin-bottom:3px">${b.service}</div><div style="color:rgba(255,255,255,.4);font-size:12px">${b.model} · ${b.plate}</div><div style="color:rgba(255,255,255,.4);font-size:12px">${b.date} às ${b.time}</div></div><div style="text-align:right"><div style="color:${statusColor(b.status)};font-size:11px;font-weight:600;padding:3px 8px;background:${statusColor(b.status)}18;border-radius:20px;margin-bottom:4px">${statusLabel(b.status)}</div><div style="color:#38bdf8;font-weight:700">€${b.price}</div></div></div>`).join('')}
  </div>`;
}

let adminPin='';
function renderAdminLogin(){
  return`<div class="page" style="display:flex;flex-direction:column;align-items:center;padding-top:60px">
    <div style="font-size:48px;margin-bottom:16px">🔐</div>
    <h2 style="color:#fff;font-family:Syne;margin-bottom:8px">Área Admin</h2>
    <p style="color:rgba(255,255,255,.4);margin-bottom:32px;font-size:13px">PIN: 1234</p>
    <div style="display:flex;gap:12px;margin-bottom:20px">${[0,1,2,3].map(i=>`<div style="width:14px;height:14px;border-radius:50%;background:${i<adminPin.length?'#38bdf8':'rgba(255,255,255,.15)'}"></div>`).join('')}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px">
      ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button ${k===''?'disabled style="opacity:0"':'onclick="pinPress(\''+k+'\')"'} style="padding:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:18px;cursor:pointer;font-family:DM Sans,sans-serif">${k}</button>`).join('')}
    </div>
    <div id="pin-err" style="color:#ef4444;font-size:12px;margin-top:12px;display:none">PIN incorreto.</div>
  </div>`;
}

function pinPress(k){
  if(k==='⌫')adminPin=adminPin.slice(0,-1);
  else if(adminPin.length<4)adminPin+=k;
  if(adminPin.length===4){
    if(adminPin==='1234'){adminLogged=true;adminPin='';render();}
    else{adminPin='';document.getElementById('pin-err').style.display='block';setTimeout(()=>render(),800);}
  } else render();
}

function renderAdminPanel(){
  const rev=bookings.filter(b=>b.payment==='pago').reduce((s,b)=>s+b.price,0);
  const p=bookings.filter(b=>b.status==='pendente').length;
  const c=bookings.filter(b=>b.status==='em_curso').length;
  const d=bookings.filter(b=>b.status==='concluido').length;
  return`<div class="page">
    <h2 style="color:#fff;font-family:Syne;font-size:22px;font-weight:800;margin-bottom:20px">Painel Admin</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      ${[["💰","Receita","€"+rev,"#10b981"],["⏳","Pendentes",p,"#f59e0b"],["🔄","Em Curso",c,"#3b82f6"],["✅","Concluídos",d,"#8b5cf6"]].map(([ic,lb,v,c])=>`<div style="background:rgba(255,255,255,.04);border:1px solid ${c}22;border-radius:14px;padding:14px 16px"><div style="font-size:22px;margin-bottom:6px">${ic}</div><div style="color:${c};font-weight:800;font-size:22px;font-family:Syne">${v}</div><div style="color:rgba(255,255,255,.4);font-size:11px">${lb.toUpperCase()}</div></div>`).join('')}
    </div>
    ${bookings.map(b=>`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div style="flex:1"><div style="color:#fff;font-weight:600;font-size:14px">${b.model} · ${b.plate}</div><div style="color:rgba(255,255,255,.45);font-size:12px">${b.service} · ${b.date} ${b.time}</div></div>
        <div style="text-align:right"><div style="color:${statusColor(b.status)};font-size:11px;font-weight:600">${statusLabel(b.status)}</div><div style="color:#38bdf8;font-weight:700">€${b.price}</div></div>
        <span style="color:rgba(255,255,255,.3);font-size:12px">▼</span>
      </div>
      <div style="display:none;margin-top:14px;border-top:1px solid rgba(255,255,255,.07);padding-top:14px">
        <div style="color:rgba(255,255,255,.4);font-size:11px;letter-spacing:1.5px;margin-bottom:8px">ESTADO</div>
        <div style="display:flex;gap:6px;margin-bottom:12px">
          ${[["pendente","Pendente"],["em_curso","Em Curso"],["concluido","Concluído"]].map(([v,l])=>`<button onclick="updateStatus('${b.id}','${v}')" style="flex:1;padding:8px 0;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;background:${b.status===v?statusColor(b.status):'rgba(255,255,255,.05)'};color:${b.status===v?'#fff':'rgba(255,255,255,.5)'}">${l}</button>`).join('')}
        </div>
        <div style="color:rgba(255,255,255,.4);font-size:11px;letter-spacing:1.5px;margin-bottom:8px">PAGAMENTO</div>
        <div style="display:flex;gap:6px">
          ${[["pendente","Pendente"],["pago","Pago"]].map(([v,l])=>`<button onclick="updatePayment('${b.id}','${v}')" style="flex:1;padding:8px 0;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;background:${b.payment===v?(v==='pago'?'#10b981':'#f59e0b'):'rgba(255,255,255,.05)'};color:${b.payment===v?'#fff':'rgba(255,255,255,.5)'}">${l}</button>`).join('')}
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function updateStatus(id,status){bookings=bookings.map(b=>b.id==id?{...b,status}:b);showNotif('Estado atualizado ✓');render();}
function updatePayment(id,payment){bookings=bookings.map(b=>b.id==id?{...b,payment}:b);showNotif('Pagamento registado ✓');render();}

render();
</script>
</body>
</html>
